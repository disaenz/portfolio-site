name: 🛠 CI Checks

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: portfolio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Static code analysis (ESLint)
        run: npm run lint

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Inject API environment variable
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
          echo "Created .env with API Base URL"

      - name: Unit tests with coverage
        run: npm run test:ci

      - name: Generate coverage summary
        if: always()
        run: npm run coverage:summary

      - name: Add coverage to job summary
        if: always()
        run: cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Upload JUnit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-report
          path: coverage/junit.xml

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Inject API environment variable
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
          echo "Created .env with API Base URL"

      - name: Build site
        run: npm run build
